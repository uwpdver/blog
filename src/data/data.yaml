products:
  - 
    name: Nofeeding
    longName: Nofeeding 一个在线RSS阅读器
    description: 通过 RSS 追踪自己喜爱的网站的内容更新，该阅读器旨在提供高效可控且令人舒适的新闻阅读体验。在提供了 RSS 阅读器的基本功能的基础之外，还可以在明亮主题和黑暗主题之间切换，支持多种文章布局方式，适配了从桌面设备到移动设备，支持 PWA 渐进式网页应用，提供了简洁美观，响应性良好，可自定义的用户界面。
